version: '3.8'

services:
  # PostgreSQL Database with read replicas
  postgres-primary:
    image: postgres:15-alpine
    container_name: civilcopz-postgres-primary
    environment:
      POSTGRES_DB: civilcopz
      POSTGRES_USER: civilcopz_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilcopz_user -d civilcopz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-replica-1:
    image: postgres:15-alpine
    container_name: civilcopz-postgres-replica-1
    environment:
      POSTGRES_DB: civilcopz
      POSTGRES_USER: civilcopz_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - civilcopz-network
    command: |
      bash -c "
        echo 'Waiting for primary to be ready...'
        while ! pg_isready -h postgres-primary -U civilcopz_user -d civilcopz; do
          sleep 2
        done
        echo 'Setting up replication...'
        rm -rf /var/lib/postgresql/data/*
        pg_basebackup -h postgres-primary -U civilcopz_user -D /var/lib/postgresql/data -Fp -Xs -P -R
        echo 'host replication civilcopz_user 0.0.0.0/0 scram-sha-256' >> /var/lib/postgresql/data/pg_hba.conf
        echo 'hot_standby = on' >> /var/lib/postgresql/data/postgresql.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        su postgres -c 'postgres -D /var/lib/postgresql/data'
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilcopz_user -d civilcopz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-replica-2:
    image: postgres:15-alpine
    container_name: civilcopz-postgres-replica-2
    environment:
      POSTGRES_DB: civilcopz
      POSTGRES_USER: civilcopz_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - civilcopz-network
    command: |
      bash -c "
        echo 'Waiting for primary to be ready...'
        while ! pg_isready -h postgres-primary -U civilcopz_user -d civilcopz; do
          sleep 2
        done
        echo 'Setting up replication...'
        rm -rf /var/lib/postgresql/data/*
        pg_basebackup -h postgres-primary -U civilcopz_user -D /var/lib/postgresql/data -Fp -Xs -P -R
        echo 'host replication civilcopz_user 0.0.0.0/0 scram-sha-256' >> /var/lib/postgresql/data/pg_hba.conf
        echo 'hot_standby = on' >> /var/lib/postgresql/data/postgresql.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        su postgres -c 'postgres -D /var/lib/postgresql/data'
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilcopz_user -d civilcopz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Redis Cluster for caching and queues
  redis-master:
    image: redis:7-alpine
    container_name: civilcopz-redis-master
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_master_data:/data
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis-replica-1:
    image: redis:7-alpine
    container_name: civilcopz-redis-replica-1
    command: redis-server --slaveof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - redis_replica1_data:/data
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    container_name: civilcopz-redis-replica-2
    command: redis-server --slaveof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - redis_replica2_data:/data
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Backend API Services (scaled)
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civilcopz-backend-1
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres-primary
      DB_READ_HOSTS: postgres-replica-1,postgres-replica-2
      REDIS_HOST: redis-master
      REDIS_READ_HOSTS: redis-replica-1,redis-replica-2
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT}
      AZURE_AI_KEY: ${AZURE_AI_KEY}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civilcopz-backend-2
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres-primary
      DB_READ_HOSTS: postgres-replica-1,postgres-replica-2
      REDIS_HOST: redis-master
      REDIS_READ_HOSTS: redis-replica-1,redis-replica-2
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT}
      AZURE_AI_KEY: ${AZURE_AI_KEY}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civilcopz-backend-3
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres-primary
      DB_READ_HOSTS: postgres-replica-1,postgres-replica-2
      REDIS_HOST: redis-master
      REDIS_READ_HOSTS: redis-replica-1,redis-replica-2
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT}
      AZURE_AI_KEY: ${AZURE_AI_KEY}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - civilcopz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # AI Worker Service
  ai-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: civilcopz-ai-worker
    environment:
      NODE_ENV: production
      WORKER_MODE: ai
      DB_HOST: postgres-primary
      REDIS_HOST: redis-master
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT}
      AZURE_AI_KEY: ${AZURE_AI_KEY}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    networks:
      - civilcopz-network
    restart: unless-stopped

  # Nginx Load Balancer
  load-balancer:
    image: nginx:alpine
    container_name: civilcopz-load-balancer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/load-balancer.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
    networks:
      - civilcopz-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: civilcopz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - civilcopz-network
    restart: unless-stopped

  # Grafana Dashboard (Operations-Grade - Phase 4)
  grafana:
    image: grafana/grafana:latest
    container_name: civilcopz-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - civilcopz-network
    restart: unless-stopped

  # Dashboard App Substrate (Operations-Grade - Phase 11)
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civilcopz-app-prod
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - civilcopz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_primary_data:
  postgres_replica1_data:
  postgres_replica2_data:
  redis_master_data:
  redis_replica1_data:
  redis_replica2_data:
  prometheus_data:
  grafana_data:

networks:
  civilcopz-network:
    driver: bridge
