# Load Balancer Configuration for National Scale
# This configuration is for Nginx as a reverse proxy/load balancer

upstream civilcopz_backend {
    # Backend servers - add more for horizontal scaling
    server backend-01:3000;
    server backend-02:3000;
    server backend-03:3000;

    # Load balancing method
    least_conn;  # Least connections algorithm

    # Health checks
    health_check interval=10s fails=3 passes=2;
}

upstream civilcopz_ai_workers {
    # AI worker instances
    server ai-worker-01:3001;
    server ai-worker-02:3001;
    server ai-worker-03:3001;

    # IP hash for session affinity (AI jobs should be processed by same worker)
    ip_hash;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=1r/s;

server {
    listen 80;
    server_name api.civilcopz.gov.in;

    # SSL Configuration (uncomment in production)
    # listen 443 ssl http2;
    # ssl_certificate /etc/ssl/certs/civilcopz.crt;
    # ssl_certificate_key /etc/ssl/private/civilcopz.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # API rate limiting
    limit_req zone=api burst=20 nodelay;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://civilcopz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Authentication endpoints (stricter rate limiting)
    location ~ ^/api/(auth|users) {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://civilcopz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # File upload endpoints (strictest rate limiting)
    location ~ ^/api/cases$ {
        limit_req zone=upload burst=2 nodelay;

        # Increase timeouts for file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Increase body size for file uploads
        client_max_body_size 10M;

        proxy_pass http://civilcopz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;  # Stream uploads directly
    }

    # General API endpoints
    location /api/ {
        proxy_pass http://civilcopz_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Static file serving (if needed)
    location /uploads/ {
        proxy_pass http://civilcopz_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Default location - return 404 for unmatched requests
    location / {
        return 404 '{"error": "Not Found", "message": "API endpoint not found"}';
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Access log format
    access_log /var/log/nginx/civilcopz_access.log main;
    error_log /var/log/nginx/civilcopz_error.log;
}

# AI Worker Load Balancer (internal only)
server {
    listen 127.0.0.1:3001;
    server_name ai-workers.internal;

    location / {
        proxy_pass http://civilcopz_ai_workers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}