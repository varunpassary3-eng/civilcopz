# Redis Cluster Configuration for National Scale
# This configuration creates a Redis cluster with master-slave replication

# Master node configuration
port 6379
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0
tcp-backlog 511
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000

# Security
requirepass your_secure_redis_password_here

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Replication (for master)
# replicaof no one

# Cluster mode (uncomment for cluster)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000

# Logging
loglevel notice
logfile /var/log/redis/redis.log

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_REDIS

# Slave configuration (uncomment and modify for replica nodes)
# replicaof redis-master 6379
# masterauth your_secure_redis_password_here

# AOF persistence for data durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Disable RDB snapshots on replicas (optional)
# save ""

# Connection pooling settings
tcp-keepalive 60
timeout 300

# Performance tuning
hz 10
maxclients 10000