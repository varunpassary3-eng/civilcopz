version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: civilcopz_test_db
    environment:
      POSTGRES_DB: civilcopz_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: civilcopz_test_redis
    command: redis-server --bind 0.0.0.0 --protected-mode no
    ports:
      - "6380:6379"

volumes:
  pgdata_test:
