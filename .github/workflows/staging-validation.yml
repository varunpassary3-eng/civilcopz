name: Staging Validation

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CLOUD_RUN_REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: civilcopz_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test

      - name: Run database migrations
        run: cd backend && npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test
          JWT_SECRET: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

  deploy-and-validate-staging:
    runs-on: ubuntu-latest
    needs: test
    env:
      STAGING_PROJECT_ID: ${{ secrets.STAGING_GCP_PROJECT_ID }}
      STAGING_GCP_WIF_PROVIDER: ${{ secrets.STAGING_GCP_WIF_PROVIDER }}
      STAGING_GCP_SERVICE_ACCOUNT: ${{ secrets.STAGING_GCP_SERVICE_ACCOUNT }}
      STAGING_CLOUD_SQL_PRIVATE_IP: ${{ secrets.STAGING_CLOUD_SQL_PRIVATE_IP }}
      STAGING_REDIS_PRIVATE_IP: ${{ secrets.STAGING_REDIS_PRIVATE_IP }}
      STAGING_VPC_CONNECTOR: ${{ secrets.STAGING_VPC_CONNECTOR }}
      STAGING_BUCKET_NAME: ${{ secrets.STAGING_BUCKET_NAME }}
      STAGING_CLOUD_SQL_INSTANCE: ${{ secrets.STAGING_CLOUD_SQL_INSTANCE }}
      STAGING_REDIS_INSTANCE: ${{ secrets.STAGING_REDIS_INSTANCE }}
      STAGING_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.STAGING_RUNTIME_SERVICE_ACCOUNT }}
      DB_PASSWORD_SECRET_VERSION: ${{ secrets.DB_PASSWORD_SECRET_VERSION }}
      REDIS_PASSWORD_SECRET_VERSION: ${{ secrets.REDIS_PASSWORD_SECRET_VERSION }}
      JWT_SECRET_SECRET_VERSION: ${{ secrets.JWT_SECRET_SECRET_VERSION }}
      OPENAI_API_KEY_SECRET_VERSION: ${{ secrets.OPENAI_API_KEY_SECRET_VERSION }}
      AZURE_AI_ENDPOINT_SECRET_VERSION: ${{ secrets.AZURE_AI_ENDPOINT_SECRET_VERSION }}
      AZURE_AI_KEY_SECRET_VERSION: ${{ secrets.AZURE_AI_KEY_SECRET_VERSION }}
      ARTIFACT_REPOSITORY: civilcopz
      BACKEND_STAGING_SERVICE: backend-staging
      WORKER_STAGING_SERVICE: ai-worker-staging
      FRONTEND_STAGING_SERVICE: frontend-staging
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.STAGING_GCP_WIF_PROVIDER }}
          service_account: ${{ env.STAGING_GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.STAGING_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/ai-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend and worker to staging
        run: >
          node scripts/gcp/deploy-staging.js
          --skip-frontend
          --project ${{ env.STAGING_PROJECT_ID }}
          --region ${{ env.CLOUD_RUN_REGION }}
          --backend-image ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/backend:${{ env.IMAGE_TAG }}
          --worker-image ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/ai-worker:${{ env.IMAGE_TAG }}

      - name: Resolve backend staging URL
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_STAGING_SERVICE }} --region ${{ env.CLOUD_RUN_REGION }} --format="value(status.url)")
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend image for staging API
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=${{ steps.backend-url.outputs.url }}/api
          push: true
          tags: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/frontend-staging:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend to staging
        run: >
          node scripts/gcp/deploy-staging.js
          --skip-backend
          --skip-worker
          --project ${{ env.STAGING_PROJECT_ID }}
          --region ${{ env.CLOUD_RUN_REGION }}
          --frontend-image ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/frontend-staging:${{ env.IMAGE_TAG }}

      - name: Validate GCP mirror
        run: node scripts/gcp/validate-gcp-mirror.js --project ${{ env.STAGING_PROJECT_ID }} --region ${{ env.CLOUD_RUN_REGION }}

      - name: Validate readiness
        run: node scripts/staging-readiness.js ${{ steps.backend-url.outputs.url }}

      - name: Validate security
        run: node scripts/validate-security.js ${{ steps.backend-url.outputs.url }}

      - name: Validate evidence integrity path
        run: node backend/scripts/evidence-consistency-check.js ${{ steps.backend-url.outputs.url }}

      - name: Validate observability wiring
        run: node scripts/gcp/validate-observability.js --project ${{ env.STAGING_PROJECT_ID }} --region ${{ env.CLOUD_RUN_REGION }} --base-url ${{ steps.backend-url.outputs.url }}

      - name: Execute Live Simulation Tests (CLTM)
        run: npm run test:live
