name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

env:
  CLOUD_RUN_REGION: us-central1
  GCP_VPC_CONNECTOR: civilcopz-connector

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: civilcopz_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test

      - name: Run database migrations
        run: cd backend && npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/civilcopz_test
          JWT_SECRET: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run security audit
        run: cd backend && npm audit --audit-level high

      - name: Run SAST scan
        uses: github/super-linter/slim@v5
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_TYPESCRIPT_ES: true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Prepare signing script
        run: |
          sed -i 's/\r$//' sign-image.sh
          chmod +x sign-image.sh

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud --quiet auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev

      - name: Build and push backend image to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign backend image
        run: |
          bash ./sign-image.sh ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/backend:${{ github.sha }}

      - name: Build and push frontend image to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign frontend image
        run: |
          bash ./sign-image.sh ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    outputs:
      backend-revision: ${{ steps.backend-canary.outputs.revision_name }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CLOUD_SQL_PRIVATE_IP: ${{ secrets.CLOUD_SQL_PRIVATE_IP }}
      REDIS_PRIVATE_IP: ${{ secrets.REDIS_PRIVATE_IP }}
      DB_NAME: civilcopz
      DB_USER: civilcopz_user

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set GCP project
        run: gcloud config set project ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev

      - name: Deploy backend to Cloud Run (no traffic)
        run: |
          IMAGE=${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/backend:${{ github.sha }}
          gcloud run deploy civilcopz-backend \
            --image $IMAGE \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 4000 \
            --no-traffic \
            --cpu 2 --memory 1Gi --min-instances 2 --max-instances 10 --concurrency 100 \
            --vpc-connector ${{ env.GCP_VPC_CONNECTOR }} \
            --vpc-egress private-ranges-only \
            --set-secrets DB_PASSWORD=DB_PASSWORD:latest,REDIS_PASSWORD=REDIS_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,AZURE_AI_ENDPOINT=AZURE_AI_ENDPOINT:latest,AZURE_AI_KEY=AZURE_AI_KEY:latest \
            --set-env-vars NODE_ENV=production,PORT=4000,DB_HOST=${{ env.CLOUD_SQL_PRIVATE_IP }},DB_NAME=${{ env.DB_NAME }},DB_USER=${{ env.DB_USER }},REDIS_HOST=${{ env.REDIS_PRIVATE_IP }}

      - name: Get backend revision and canary 10%
        id: backend-canary
        run: |
          REV=$(gcloud run services describe civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --format="value(status.latestCreatedRevisionName)")
          echo "revision_name=$REV" >> $GITHUB_OUTPUT
          gcloud run services update-traffic civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --to-revisions $REV=10
          URL=$(gcloud run services describe civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --format="value(status.url)")
          echo "Health check $URL/health"
          curl -f "$URL/health"
          echo "Canary deployed at 10%, waiting 180s prior to promote"
          sleep 180

      - name: Promote backend to 100%
        run: |
          REV=${{ steps.backend-canary.outputs.revision_name }}
          gcloud run services update-traffic civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --to-revisions $REV=100

      - name: Deploy frontend to Cloud Run
        run: |
          IMAGE=${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/civilcopz/frontend:${{ github.sha }}
          gcloud run deploy civilcopz-frontend \
            --image $IMAGE \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --cpu 1 --memory 512Mi --min-instances 1 --max-instances 6 --concurrency 1000

      - name: Post-deploy summary
        run: |
          echo "Backend URL: $(gcloud run services describe civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --format='value(status.url)')"
          echo "Frontend URL: $(gcloud run services describe civilcopz-frontend --region ${{ env.CLOUD_RUN_REGION }} --format='value(status.url)')"

          echo "Rollback command: gcloud run services update-traffic civilcopz-backend --region ${{ env.CLOUD_RUN_REGION }} --to-revisions <previous_rev>=100"
