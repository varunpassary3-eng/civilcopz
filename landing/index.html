<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivilCOPZ | National Consumer Protection Portal</title>
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --text: #0f172a;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .features {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        .feature {
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CivilCOPZ</h1>
        <p>Industrial-Grade Consumer Protection & Grievance AI Substrate</p>
        
        <div class="btn-group">
            <a href="http://localhost:5173/register" class="btn btn-primary">File a Grievance</a>
            <a href="http://localhost:5173/login" class="btn btn-outline">Open Dashboard →</a>
        </div>

        <div class="features">
            <div class="feature">
                <h3>⚖️ Legal Grade</h3>
                <p>Non-repudiable evidence hashing.</p>
            </div>
            <div class="feature">
                <h3>🤖 AI Powered</h3>
                <p>Automated case classification.</p>
            </div>
            <div class="feature">
                <h3>🏛️ National Scale</h3>
                <p>Sovereign infrastructure for trust.</p>
            </div>
        </div>
    </div>
</body>
</html>
